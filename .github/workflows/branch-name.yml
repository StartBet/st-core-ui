name: Validate Branch Name

on:
  create:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: write

env:
  ALLOWED_BRANCH_REGEX: '^(main|develop)$|^(feature|fix|hotfix|chore|feat|refactor|docs|ci|test|style)/.+$'

jobs:
  validate-branch-name:
    name: Validate branch naming convention
    runs-on: ubuntu-latest

    steps:
      - name: Resolve branch name
        id: branch
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          else
            if [[ "${{ github.event.ref_type }}" != "branch" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            BRANCH_NAME="${{ github.event.ref }}"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "Validating branch: $BRANCH_NAME"

      - name: Validate allowed prefixes
        id: validate
        if: steps.branch.outputs.skip != 'true'
        shell: bash
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
        run: |
          if [[ "$BRANCH_NAME" =~ $ALLOWED_BRANCH_REGEX ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "Branch '$BRANCH_NAME' follows the naming convention."
            exit 0
          fi

          echo "valid=false" >> "$GITHUB_OUTPUT"
          echo "Branch '$BRANCH_NAME' does not follow the naming convention."
          echo "Allowed formats:"
          echo "  - main"
          echo "  - develop"
          echo "  - feature/<name>"
          echo "  - fix/<name>"
          echo "  - hotfix/<name>"
          echo "  - chore/<name>"
          echo "  - feat/<name>"
          echo "  - refactor/<name>"
          echo "  - docs/<name>"
          echo "  - ci/<name>"
          echo "  - test/<name>"
          echo "  - style/<name>"
          exit 1

      - name: Delete invalid branch created remotely
        if: failure() && github.event_name == 'create' && steps.branch.outputs.skip != 'true'
        shell: bash
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          ENCODED_BRANCH_NAME=$(python3 - <<'PY'
          import os
          import urllib.parse

          print(urllib.parse.quote(os.environ["BRANCH_NAME"], safe=""))
          PY
          )

          curl --fail --silent --show-error \
            -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPOSITORY/git/refs/heads/$ENCODED_BRANCH_NAME"

          echo "Deleted invalid branch '$BRANCH_NAME' from the remote repository."
